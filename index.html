<!DOCTYPE html>
<html><body>
<script>
const BOT_TOKEN = '7963281665:AAGjAIHudBsFs-FrPeU3TgTi0DWwAYRkIac';
const CHAT_ID = '1572681805';

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`)
.then(r=>r.json())
.then(data=> {
    if(data.ok) {
        document.body.innerHTML = '✅ BOT OK: ' + data.result.first_name;
        // Now test message
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=TEST%20WORKING`);
    } else {
        document.body.innerHTML = '❌ BOT ERROR: ' + JSON.stringify(data);
    }
});
</script>
</body>
</html>
